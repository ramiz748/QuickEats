{% extends 'base.html' %}
{% block title %}Payment — QuickEats{% endblock %}
{% block content %}

<section style="padding:60px 0">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="form-card text-center">
                    <div style="width:70px;height:70px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem">
                        💳
                    </div>
                    <div style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#1c1c1e">
                        Secure Payment
                    </div>
                    <p style="color:#8e8e93;font-size:0.9rem;margin-top:6px">Order #{{ order.id }}</p>
                    <div style="font-size:2rem;font-weight:700;color:#e8572a;margin:1rem 0;font-family:'Playfair Display',serif">
                        Rs.{{ order.total_amount }}
                    </div>

                    <div style="background:#f8f7f4;border-radius:16px;padding:1.2rem;margin-bottom:1.5rem;text-align:left">
                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <input type="text" class="form-control" value="4111 1111 1111 1111" readonly>
                        </div>
                        <div class="row g-2">
                            <div class="col">
                                <label class="form-label">Expiry</label>
                                <input type="text" class="form-control" value="12/26" readonly>
                            </div>
                            <div class="col">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control" value="123" readonly>
                            </div>
                        </div>
                    </div>

                    <div style="background:#fff3ef;border-radius:12px;padding:10px 14px;font-size:0.82rem;color:#e8572a;margin-bottom:1.5rem">
                        This is a mock payment for demo purposes only.
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn-primary-custom d-block text-center w-100" style="font-size:1rem">
                            Pay Rs.{{ order.total_amount }}
                        </button>
                    </form>
                    <a href="{% url 'my_orders' %}" style="display:block;margin-top:12px;color:#8e8e93;font-size:0.9rem;text-decoration:none">
                        Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
