{% extends 'base.html' %}
{% block title %}Login — QuickEats{% endblock %}
{% block content %}

<section style="padding:60px 0">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="form-card">
                    <div class="text-center mb-4">
                        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#1c1c1e">
                            Welcome back
                        </div>
                        <p style="color:#8e8e93;font-size:0.9rem;margin-top:6px">Login to your QuickEats account</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn-primary-custom w-100 text-center" style="display:block;text-align:center">
                            Login
                        </button>
                    </form>
                    <hr style="margin:1.5rem 0;border-color:#ebebeb">
                    <p class="text-center mb-0" style="font-size:0.9rem;color:#8e8e93">
                        Don't have an account?
                        <a href="{% url 'register' %}" style="color:#e8572a;font-weight:600;text-decoration:none">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
